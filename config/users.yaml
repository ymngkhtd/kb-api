# Knowledge Base API - User Configuration
#
# White-listed paths are RELATIVE to the knowledge base root.
#   - "" (empty string) = access entire knowledge base
#   - "30_Resources" = only access 30_Resources and its subdirectories
#   - "20_Areas/22_Finance" = only access that specific area
#
# Generate password hash:
#   python scripts/hash_password.py
#
# Available permissions: read, write, delete, search, classify

users:
  - username: "admin"
    # Default password: "changeme" — CHANGE THIS after first login!
    # Generate new hash: python scripts/hash_password.py
    password_hash: "$2b$12$PLACEHOLDER_RUN_HASH_SCRIPT_TO_GENERATE"
    role: "admin"
    allowed_paths:
      - ""
    permissions:
      - "read"
      - "write"
      - "delete"
      - "search"
      - "classify"

  # Example: read-only agent with restricted access
  # - username: "agent-reader"
  #   password_hash: "$2b$12$..."
  #   role: "agent"
  #   allowed_paths:
  #     - "30_Resources"
  #     - "20_Areas"
  #   permissions:
  #     - "read"
  #     - "search"
